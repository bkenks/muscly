name: muscly
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

fonts:
  - family: NotoSans
    fonts:
      - asset: assets/fonts/NotoSans.ttf
        weight: 700
      - asset: assets/fonts/NotoSans-Italic.ttf
        style: italic